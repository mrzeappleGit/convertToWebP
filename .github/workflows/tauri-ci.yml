name: Tauri CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            artifact: WebWeaverKit-windows
            bundle-path: src-tauri/target/release/WebWeaverKit.exe
          - platform: ubuntu-22.04
            artifact: WebWeaverKit-linux
            bundle-path: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/rpm/*.rpm
              src-tauri/target/release/bundle/appimage/*.AppImage
          - platform: macos-latest
            artifact: WebWeaverKit-macos
            bundle-path: |
              src-tauri/target/release/bundle/dmg/*.dmg

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # Linux: install system dependencies for Tauri + WebKit
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            javascriptcoregtk-4.1-dev

      # macOS: import signing certificate into keychain (must happen before codesigning ffmpeg)
      - name: Import Apple signing certificate
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          echo $APPLE_CERTIFICATE | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -k $KEYCHAIN_PATH \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security list-keychain -d user -s $KEYCHAIN_PATH
          security find-identity -v $KEYCHAIN_PATH

      # macOS: download FFmpeg and codesign it with hardened runtime for notarization
      - name: Bundle and sign FFmpeg for macOS
        if: matrix.platform == 'macos-latest'
        run: |
          mkdir -p resources
          curl -L "https://evermeet.cx/ffmpeg/getrelease/zip" -o ffmpeg.zip
          unzip ffmpeg.zip -d resources/
          chmod +x resources/ffmpeg
          codesign --force --options runtime --sign "${{ secrets.APPLE_SIGNING_IDENTITY }}" --timestamp resources/ffmpeg
          codesign -vvv resources/ffmpeg
          echo "FFmpeg signed successfully"

      - run: npm ci

      # Build with signing + notarization on macOS
      - name: Build (macOS signed + notarized)
        if: matrix.platform == 'macos-latest'
        run: npm run tauri build
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # Build on Windows (standalone exe, no installer)
      - name: Build (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          npm run tauri build -- --no-bundle
          mv src-tauri/target/release/app.exe src-tauri/target/release/WebWeaverKit.exe

      # Build on Linux
      - name: Build (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: npm run tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.bundle-path }}
