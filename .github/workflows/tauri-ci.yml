name: Tauri CI

on:
  push:
    branches: [v2/tauri]
  pull_request:
    branches: [v2/tauri]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tauri-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tauri-app/package-lock.json
      - run: npm ci
      - run: npm test

  build:
    needs: test
    runs-on: windows-latest
    defaults:
      run:
        working-directory: tauri-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tauri-app/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri-app/src-tauri -> target
      - run: npm ci
      - run: npm run tauri build
      - uses: actions/upload-artifact@v4
        with:
          name: WebWeaverKit-windows
          path: |
            tauri-app/src-tauri/target/release/bundle/nsis/*.exe
            tauri-app/src-tauri/target/release/bundle/msi/*.msi
